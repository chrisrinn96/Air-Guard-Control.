    description: "Clean, modern abstract background with soft teal, cyan, and white gradients, representing fresh air and purity, soft light leaks"
    aspect_ratio: "16:9"
  - path: "artifacts/pure-air-guard/public/images/empty-state.png"
    description: "Minimalist 3D illustration of a clean, airy room with a subtle breeze, representing a healthy environment without mould"
