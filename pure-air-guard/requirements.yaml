packages:
  "recharts": "For rendering data visualization charts on the dashboard"
  "date-fns": "For formatting dates consistently across tables and cards"
  "framer-motion": "For page transitions, smooth micro-interactions, and staggered list animations"
  "lucide-react": "For beautiful, consistent iconography across the application"

images:
